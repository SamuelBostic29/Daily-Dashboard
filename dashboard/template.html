<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning, Sam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background:
                radial-gradient(ellipse 60% 50% at 20% 10%, rgba(251, 146, 60, 0.15), transparent 70%),
                radial-gradient(ellipse 50% 50% at 85% 90%, rgba(244, 114, 82, 0.12), transparent 70%),
                #1a1520;
            background-attachment: fixed;
            color: #e1e4e8;
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 32px 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 36px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fb923c, #f97316, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        header .timestamp {
            font-size: 14px;
            color: #6b7280;
        }

        header .refresh-status {
            font-size: 12px;
            color: #4b5563;
            margin-top: 4px;
            min-height: 16px;
            transition: color 0.3s;
        }

        header .refresh-status.stale { color: #fbbf24; }

        .sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 24px;
            width: 95%;
            margin: 0 auto;
        }

        #emails { grid-column: 1 / -1; }
        #emails .section-body { max-height: 60vh; }

        .section {
            background: rgba(22, 27, 45, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .section:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            user-select: none;
        }

        .section-header:focus {
            outline: 2px solid #fb923c;
            outline-offset: -2px;
            border-radius: 16px 16px 0 0;
        }

        .section-icon { font-size: 18px; margin-right: 10px; }
        .section-title-group { display: flex; align-items: center; }
        .section-title { font-size: 15px; font-weight: 600; color: #e2e8f0; }

        #emails .section-header { border-top: 3px solid #fb923c; }
        #prs .section-header { border-top: 3px solid #f97316; }
        #issues .section-header { border-top: 3px solid #ef4444; }

        .badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 12px; min-width: 26px; text-align: center; }
        #emails .badge { background: rgba(251, 146, 60, 0.2); color: #fdba74; }
        #prs .badge { background: rgba(249, 115, 22, 0.2); color: #fb923c; }
        #issues .badge { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }
        .badge.zero { background: rgba(255, 255, 255, 0.05); color: #4b5563; }

        .section-body { max-height: 500px; overflow-y: auto; }

        .item {
            display: block;
            padding: 14px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            text-decoration: none;
            color: inherit;
            transition: background 0.15s, padding-left 0.15s;
        }

        .item:last-child { border-bottom: none; }
        .item:hover { background: rgba(255, 255, 255, 0.04); padding-left: 26px; }

        .item-row { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }

        .item-primary {
            font-size: 13px; font-weight: 500; color: #e2e8f0;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
        }

        .item-preview {
            font-size: 12px; color: #94a3b8; margin-top: 4px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; text-overflow: ellipsis;
            line-height: 1.4;
        }

        .item-meta {
            font-size: 12px; color: #6b7280; margin-top: 3px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        .item.dismissed { display: none; }

        .dismiss-btn {
            background: none; border: none; color: #4b5563; cursor: pointer;
            font-size: 16px; padding: 0 0 0 8px; line-height: 1; flex-shrink: 0;
            transition: color 0.15s, transform 0.15s;
        }

        .dismiss-btn:hover { color: #fb923c; transform: scale(1.3); }

        .sub-group-label {
            font-size: 11px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 1px; color: #6b7280; padding: 12px 22px 6px;
        }

        .label-tag {
            display: inline-block; font-size: 10px; font-weight: 600;
            padding: 2px 8px; border-radius: 12px;
            background: rgba(249, 115, 22, 0.15); color: #fdba74; margin-right: 4px;
        }

        .ci-pass { color: #34d399; }
        .ci-fail { color: #fb7185; }
        .ci-pending { color: #fbbf24; }

        .empty-state { padding: 32px 22px; text-align: center; color: #4b5563; font-size: 13px; font-style: italic; }

        .section-body::-webkit-scrollbar { width: 5px; }
        .section-body::-webkit-scrollbar-track { background: transparent; }
        .section-body::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        .section-body::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }

        @media (max-width: 1100px) {
            .sections { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="greeting"></h1>
            <div class="timestamp" id="timestamp"></div>
            <div class="refresh-status" id="refresh-status"></div>
        </header>

        <div class="sections">
            <section class="section" id="emails">
                <div class="section-header" tabindex="0">
                    <div class="section-title-group">
                        <span class="section-icon">&#9993;</span>
                        <span class="section-title">Emails</span>
                    </div>
                    <span class="badge" id="emails-badge">0</span>
                </div>
                <div class="section-body" id="emails-body"></div>
            </section>

            <section class="section" id="prs">
                <div class="section-header" tabindex="0">
                    <div class="section-title-group">
                        <span class="section-icon">&#9734;</span>
                        <span class="section-title">Pull Requests</span>
                    </div>
                    <span class="badge" id="prs-badge">0</span>
                </div>
                <div class="section-body" id="prs-body"></div>
            </section>

            <section class="section" id="issues">
                <div class="section-header" tabindex="0">
                    <div class="section-title-group">
                        <span class="section-icon">&#9888;</span>
                        <span class="section-title">Assigned Issues</span>
                    </div>
                    <span class="badge" id="issues-badge">0</span>
                </div>
                <div class="section-body" id="issues-body"></div>
            </section>
        </div>
    </div>

    <script src="data-meta.js"></script>
    <script src="data-emails.js"></script>
    <script src="data-prs.js"></script>
    <script src="data-issues.js"></script>
    <script>
        // --- Greeting ---
        (function() {
            var hour = new Date().getHours();
            var mornings = ["Good Morning, Sam", "Rise and Shine, Sam", "Let's Get It, Sam", "Top of the Morning, Sam", "Ready to Roll, Sam", "New Day, New Wins, Sam", "Coffee's Ready, Sam"];
            var afternoons = ["Good Afternoon, Sam", "Still at It, Sam", "Afternoon Check-in, Sam", "How's the Day Going, Sam"];
            var evenings = ["Good Evening, Sam", "Burning the Midnight Oil, Sam", "Late Night Grind, Sam", "Wrapping Up, Sam"];
            var greetings = hour < 12 ? mornings : hour < 17 ? afternoons : evenings;
            var pick = greetings[Math.floor(Math.random() * greetings.length)];
            document.getElementById('greeting').textContent = pick;
            document.title = pick;
        })();

        // --- State ---
        window.BRIEFING_DATA = {
            generatedAt: (window.BRIEFING_META && window.BRIEFING_META.generatedAt) || '',
            emails: window.BRIEFING_EMAILS || [],
            prs: window.BRIEFING_PRS || { mine: [], review: [] },
            issues: window.BRIEFING_ISSUES || []
        };
        var data = window.BRIEFING_DATA;
        var lastGeneratedAt = data.generatedAt;
        var lastUpdateMs = Date.now();
        var CHECK_INTERVAL_MS = 60000; // how often we poll data-meta.js for a new generatedAt

        // --- Dismiss state (per-day) ---
        var storageKey = 'gmc-dismissed-' + new Date().toISOString().slice(0, 10);
        Object.keys(localStorage).forEach(function(key) {
            if (key.startsWith('gmc-dismissed-') && key !== storageKey) localStorage.removeItem(key);
        });
        var dismissed = JSON.parse(localStorage.getItem(storageKey) || '[]');

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, function(c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }

        function renderItem(item) {
            var previewHtml = item.preview
                ? '<div class="item-preview">' + escapeHtml(item.preview) + '</div>'
                : '';
            return '<a class="item" href="' + item.url + '" target="_blank" data-item-id="' + item.id + '">'
                + '<div class="item-row">'
                + '<span class="item-primary">' + item.title + '</span>'
                + '<button class="dismiss-btn" onclick="dismissItem(\'' + item.id + '\', event)">&times;</button>'
                + '</div>'
                + previewHtml
                + '<div class="item-meta">' + item.meta + (item.labels && item.labels.length ? ' · ' + item.labels.map(function(l) { return '<span class="label-tag">' + l + '</span>'; }).join(' ') : '') + '</div>'
                + '</a>';
        }

        function renderSection(id, items) {
            var body = document.getElementById(id + '-body');
            if (!items || items.length === 0) {
                body.innerHTML = '<div class="empty-state">No items</div>';
            } else {
                body.innerHTML = items.map(renderItem).join('');
            }
        }

        function renderPRs() {
            var body = document.getElementById('prs-body');
            var mine = data.prs.mine || [];
            var review = data.prs.review || [];
            if (mine.length === 0 && review.length === 0) {
                body.innerHTML = '<div class="empty-state">No items</div>';
                return;
            }
            var html = '';
            html += '<div class="sub-group-label">My PRs</div>';
            html += mine.length ? mine.map(renderItem).join('') : '<div class="empty-state">None</div>';
            html += '<div class="sub-group-label">Needs My Review</div>';
            html += review.length ? review.map(renderItem).join('') : '<div class="empty-state">None</div>';
            body.innerHTML = html;
        }

        function applyDismissed() {
            dismissed.forEach(function(id) {
                var el = document.querySelector('[data-item-id="' + id + '"]');
                if (el) el.classList.add('dismissed');
            });
            updateBadges();
        }

        function dismissItem(id, event) {
            event.preventDefault();
            event.stopPropagation();
            dismissed.push(id);
            localStorage.setItem(storageKey, JSON.stringify(dismissed));
            var el = document.querySelector('[data-item-id="' + id + '"]');
            if (el) el.classList.add('dismissed');
            updateBadges();
        }

        function updateBadges() {
            ['emails', 'prs', 'issues'].forEach(function(id) {
                var body = document.getElementById(id + '-body');
                var badge = document.getElementById(id + '-badge');
                var visible = body.querySelectorAll('.item:not(.dismissed)').length;
                badge.textContent = visible;
                badge.classList.toggle('zero', visible === 0);
            });
        }

        function renderAll() {
            document.getElementById('timestamp').textContent =
                data.generatedAt ? 'Last refreshed: ' + data.generatedAt : '';
            renderSection('emails', data.emails);
            renderPRs();
            renderSection('issues', data.issues);
            applyDismissed();
        }

        renderAll();

        // --- Auto-reload (file:// blocks fetch, so re-inject scripts with a cache-buster) ---
        function pollIntervalMs() {
            var mins = (window.BRIEFING_META && window.BRIEFING_META.intervalMinutes) || 30;
            return mins * 60000;
        }

        function setRefreshStatus() {
            var el = document.getElementById('refresh-status');
            if ((Date.now() - lastUpdateMs) > 2 * pollIntervalMs()) {
                el.textContent = 'Waiting for update…';
                el.classList.add('stale');
            } else {
                el.textContent = '';
                el.classList.remove('stale');
            }
        }

        function injectScript(src, cb) {
            // Try a cache-busted URL first (works over http and on most file:// setups). Some
            // browsers reject the query on file:// (treat it as a missing filename) — fall back
            // to the bare path, which re-reads from disk since file:// isn't HTTP-cached.
            var s = document.createElement('script');
            s.src = src + '?v=' + Date.now();
            s.onload = function() { s.remove(); cb(true); };
            s.onerror = function() {
                s.remove();
                var bare = document.createElement('script');
                bare.src = src;
                bare.onload = function() { bare.remove(); cb(true); };
                bare.onerror = function() { bare.remove(); cb(false); };
                document.head.appendChild(bare);
            };
            document.head.appendChild(s);
        }

        function reloadData() {
            // Preserve per-section scroll and page position across the re-render.
            var scrolls = {};
            document.querySelectorAll('.section-body').forEach(function(b) { scrolls[b.id] = b.scrollTop; });
            var pageY = window.scrollY;

            // data-meta.js is written last by the briefing, so the data files are already fresh.
            var files = ['data-emails.js', 'data-prs.js', 'data-issues.js'];
            var pending = files.length;
            files.forEach(function(f) {
                injectScript(f, function() {
                    if (--pending > 0) return;
                    data.emails = window.BRIEFING_EMAILS || [];
                    data.prs = window.BRIEFING_PRS || { mine: [], review: [] };
                    data.issues = window.BRIEFING_ISSUES || [];
                    data.generatedAt = (window.BRIEFING_META && window.BRIEFING_META.generatedAt) || data.generatedAt;
                    renderAll();
                    Object.keys(scrolls).forEach(function(id) {
                        var b = document.getElementById(id);
                        if (b) b.scrollTop = scrolls[id];
                    });
                    window.scrollTo(0, pageY);
                    lastUpdateMs = Date.now();
                    setRefreshStatus();
                });
            });
        }

        function checkForUpdate() {
            injectScript('data-meta.js', function(ok) {
                if (ok) {
                    var gen = window.BRIEFING_META && window.BRIEFING_META.generatedAt;
                    if (gen && gen !== lastGeneratedAt) {
                        lastGeneratedAt = gen;
                        reloadData();
                        return;
                    }
                }
                setRefreshStatus();
            });
        }

        setInterval(checkForUpdate, CHECK_INTERVAL_MS);
        setRefreshStatus();

        // --- Keyboard nav ---
        var headers = document.querySelectorAll('.section-header');
        var currentSection = 0;
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                currentSection = (currentSection + 1) % headers.length;
                headers[currentSection].focus();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                currentSection = (currentSection - 1 + headers.length) % headers.length;
                headers[currentSection].focus();
            }
        });
    </script>
</body>
</html>
