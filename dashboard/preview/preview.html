<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dashboard</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/preview.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <header>
            <h1 id="greeting"></h1>
            <div class="timestamp" id="timestamp"></div>
            <div class="refresh-controls">
                <button class="refresh-btn" id="refresh-btn" type="button">&#8635; Refresh</button>
                <span class="refresh-pill" id="refresh-pill"><span class="refresh-dot"></span><span class="refresh-label">Up to date</span></span>
            </div>
        </header>

        <nav class="view-tabs" role="tablist" aria-label="Views">
            <button class="view-tab active" id="tab-dashboard" type="button" role="tab"
                    aria-selected="true" aria-controls="view-dashboard">Dashboard</button>
            <button class="view-tab" id="tab-todo" type="button" role="tab"
                    aria-selected="false" aria-controls="view-todo" tabindex="-1">TODO</button>
        </nav>

        <div id="view-dashboard" role="tabpanel" aria-labelledby="tab-dashboard">
            <div class="view-actions">
                <button class="action-btn" id="add-to-todo-btn" type="button">Add to TODO</button>
                <button class="action-btn primary" id="selection-done-btn" type="button" hidden>Done</button>
                <button class="action-btn" id="selection-cancel-btn" type="button" hidden>Cancel</button>
            </div>
            <div class="sections">
                <section class="section" id="emails">
                    <div class="section-header" tabindex="0" role="button" aria-expanded="true">
                        <div class="section-title-group">
                            <span class="section-icon">&#9993;</span>
                            <span class="section-title">Emails</span>
                        </div>
                        <span class="badge" id="emails-badge">0</span>
                    </div>
                    <div class="section-body" id="emails-body"></div>
                </section>

                <section class="section" id="prs">
                    <div class="section-header" tabindex="0" role="button" aria-expanded="true">
                        <div class="section-title-group">
                            <span class="section-icon">&#9734;</span>
                            <span class="section-title">Pull Requests</span>
                        </div>
                        <span class="badge" id="prs-badge">0</span>
                    </div>
                    <div class="section-body" id="prs-body"></div>
                </section>

                <section class="section" id="issues">
                    <div class="section-header" tabindex="0" role="button" aria-expanded="true">
                        <div class="section-title-group">
                            <span class="section-icon">&#9888;</span>
                            <span class="section-title">Assigned Issues</span>
                        </div>
                        <span class="badge" id="issues-badge">0</span>
                    </div>
                    <div class="section-body" id="issues-body"></div>
                </section>
            </div>
        </div>

        <div id="view-todo" role="tabpanel" aria-labelledby="tab-todo" hidden>
            <div class="view-actions">
                <button class="action-btn" id="add-custom-btn" type="button" aria-haspopup="dialog">+ New Item</button>
            </div>
            <section class="section" id="todo">
                <div class="section-header" tabindex="0" role="button" aria-expanded="true">
                    <div class="section-title-group">
                        <span class="section-icon">&#10003;</span>
                        <span class="section-title">TODO</span>
                    </div>
                    <span class="badge" id="todo-badge">0</span>
                </div>
                <div class="section-body" id="todo-body"></div>
            </section>
        </div>
    </div>

    <div class="modal-overlay" id="custom-item-modal" hidden>
        <form class="modal" role="dialog" aria-modal="true" aria-labelledby="custom-item-heading">
            <h2 id="custom-item-heading">New TODO Item</h2>
            <label>Label
                <input type="text" id="custom-label" required maxlength="200" autocomplete="off">
            </label>
            <label>Description
                <input type="text" id="custom-description" maxlength="500" autocomplete="off">
            </label>
            <label>Link
                <input type="text" id="custom-link" maxlength="2000" autocomplete="off" placeholder="https://&hellip;">
            </label>
            <div class="modal-actions">
                <button class="action-btn" id="custom-cancel-btn" type="button">Cancel</button>
                <button class="action-btn primary" type="submit">Add</button>
            </div>
        </form>
    </div>

    <script src="../renderers.js"></script>
    <script src="../todo-store.js"></script>
    <script src="../behavior.js"></script>
    <script src="../test-data.js"></script>
    <script src="preview.js"></script>
</body>
</html>
