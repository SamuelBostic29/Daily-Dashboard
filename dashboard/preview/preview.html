<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good Morning, Sam</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/preview.css">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="container">
        <header>
            <h1 id="greeting"></h1>
            <div class="timestamp" id="timestamp"></div>
        </header>

        <div class="sections">
            <section class="section" id="emails">
                <div class="section-header" tabindex="0">
                    <div class="section-title-group">
                        <span class="section-icon">&#9993;</span>
                        <span class="section-title">Emails</span>
                    </div>
                    <span class="badge" id="emails-badge">0</span>
                </div>
                <div class="section-body" id="emails-body"></div>
            </section>

            <section class="section" id="prs">
                <div class="section-header" tabindex="0">
                    <div class="section-title-group">
                        <span class="section-icon">&#9734;</span>
                        <span class="section-title">Pull Requests</span>
                    </div>
                    <span class="badge" id="prs-badge">0</span>
                </div>
                <div class="section-body" id="prs-body"></div>
            </section>

            <section class="section" id="issues">
                <div class="section-header" tabindex="0">
                    <div class="section-title-group">
                        <span class="section-icon">&#9888;</span>
                        <span class="section-title">Assigned Issues</span>
                    </div>
                    <span class="badge" id="issues-badge">0</span>
                </div>
                <div class="section-body" id="issues-body"></div>
            </section>
        </div>
    </div>

    <script src="../renderers.js"></script>
    <script src="../behavior.js"></script>
    <script src="../test-data.js"></script>
    <script>
        // --- Greeting ---
        (function() {
            var hour = new Date().getHours();
            var mornings = ["Good Morning, Sam", "Rise and Shine, Sam", "Let's Get It, Sam", "Top of the Morning, Sam", "Ready to Roll, Sam", "New Day, New Wins, Sam", "Coffee's Ready, Sam"];
            var afternoons = ["Good Afternoon, Sam", "Still at It, Sam", "Afternoon Check-in, Sam", "How's the Day Going, Sam"];
            var evenings = ["Good Evening, Sam", "Burning the Midnight Oil, Sam", "Late Night Grind, Sam", "Wrapping Up, Sam"];
            var greetings = hour < 12 ? mornings : hour < 17 ? afternoons : evenings;
            var pick = greetings[Math.floor(Math.random() * greetings.length)];
            document.getElementById('greeting').textContent = pick;
            document.title = pick;
        })();

        // --- Render ---
        var data = window.BRIEFING_DATA || { generatedAt: '', emails: [], prs: { mine: [], review: [] }, issues: [] };

        document.getElementById('timestamp').textContent = data.generatedAt;

        DashboardRenderers.renderSection('emails', data.emails, DashboardRenderers.renderEmailItem);
        DashboardRenderers.renderPRs(data.prs);
        DashboardRenderers.renderSection('issues', data.issues, DashboardRenderers.renderIssueItem);

        DashboardBehavior.init({ scope: 'preview' });
        DashboardBehavior.applyDismissed();
    </script>
</body>
</html>
